<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#ff4f87">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon-192.png">
<title>여우방 팔로우리스트</title>
<style>
*{box-sizing:border-box}body{margin:0;padding:12px 12px 76px;font-family:Arial,'Apple SD Gothic Neo','Malgun Gothic',sans-serif;background:linear-gradient(180deg,#ff78ad 0,#ffe8f1 190px,#fff8fb 100%);color:#241f23}.header{padding:20px 6px 18px;display:flex;align-items:center;gap:12px}.logo{width:68px;height:68px;border-radius:20px;object-fit:cover;box-shadow:0 10px 22px rgba(196,48,105,.25)}.kicker{font-weight:900;color:#a63462;letter-spacing:2px;font-size:13px}h1{margin:2px 0 0;font-size:25px;color:#bc2f68;line-height:1.05}.box{background:rgba(255,255,255,.94);border:1px solid #ffd1e2;border-radius:22px;padding:12px;margin-bottom:12px;box-shadow:0 8px 18px rgba(255,79,135,.12)}.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}.stat{background:#fff;border:1px solid #ffd5e3;border-radius:16px;text-align:center;padding:10px 4px}.stat b{display:block;color:#d13875;font-size:22px}.stat span{font-size:12px;font-weight:800}.search{width:100%;height:48px;border:1px solid #ffd1e2;border-radius:16px;padding:0 14px;font-size:16px;outline:none;background:#fffafc}.row{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-top:9px}button{border:0;border-radius:15px;height:46px;font-size:15px;font-weight:900;color:white;background:#ff4f87}.black{background:#222}.outline{background:white;color:#d13875;border:1px solid #ff9abc}.tabs{display:flex;gap:8px;overflow-x:auto;padding-top:10px}.tab{min-width:58px;border-radius:999px;height:42px;background:white;color:#c1356f;border:1px solid #e8a7be}.tab.active{background:#ff4f87;color:white;border-color:#ff4f87}.count{font-size:13px;color:#777;margin-top:8px}.notice{display:none;margin-top:10px;border:1px solid #ffd1e2;background:#fff7fb;border-radius:16px;padding:10px;font-size:13px;line-height:1.45}.groupTitle{margin:16px 4px 8px;color:#c1356f;font-size:22px;font-weight:900}.groupCopy{width:100%;background:linear-gradient(90deg,#8d37c6,#ff4f87,#ffa52f);margin-bottom:8px}.card{display:flex;align-items:center;gap:10px;background:white;border:1px solid #ffe0eb;border-radius:17px;padding:8px 10px;margin-bottom:7px;box-shadow:0 5px 13px rgba(255,79,135,.10)}.no{min-width:34px;width:34px;height:34px;border-radius:11px;background:#fff2d6;color:#d13875;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:13px}.info{min-width:0;flex:1}.name{font-size:14px;font-weight:900;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.insta{font-size:12px;color:#777;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.ig{text-decoration:none;color:white;background:linear-gradient(90deg,#8d37c6,#ff4f87,#ffa52f);border-radius:999px;padding:8px 10px;font-size:12px;font-weight:900;white-space:nowrap}.empty{background:white;border-radius:18px;padding:26px;text-align:center;color:#777;line-height:1.5}.bottom{position:fixed;left:0;right:0;bottom:0;display:flex;background:rgba(255,255,255,.96);box-shadow:0 -5px 15px rgba(0,0,0,.08);padding-bottom:env(safe-area-inset-bottom);z-index:10}.bottom button{flex:1;background:white;color:#c1356f;border-radius:0;height:58px;font-size:12px}.modalBg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:50;align-items:center;justify-content:center;padding:18px}.modal{background:white;border-radius:24px;padding:18px;width:100%;max-width:420px;max-height:86vh;overflow:auto}.modal h2{margin:0 0 12px;color:#d13875}.modal input,.modal textarea{width:100%;border:1px solid #ffd1e2;border-radius:14px;padding:12px;margin-bottom:8px;font-size:15px}.modal textarea{height:90px}.adminActions{display:grid;grid-template-columns:1fr 1fr;gap:8px}.small{font-size:12px;color:#777;line-height:1.5;margin-top:8px}
</style>
</head>
<body>
<header class="header"><img class="logo" src="icon-192.png" alt="여우방"><div><div class="kicker">FOLLOW LIST</div><h1>여우방 팔로우리스트</h1></div></header>
<section class="box"><div class="stats"><div class="stat"><b id="total">0</b><span>전체 인원</span></div><div class="stat"><b id="groups">0</b><span>전체 조</span></div><div class="stat"><b>30</b><span>조별 인원</span></div></div></section>
<section class="box"><input id="search" class="search" placeholder="🔍 번호 · 닉네임 · 아이디 검색" oninput="render()"><div class="row"><button onclick="loadData()">↻ 새로고침</button><button class="black" onclick="openAdmin()">🔐 관리자모드</button></div><div id="tabs" class="tabs"></div><div id="count" class="count">불러오는 중...</div><div id="noticeBox" class="notice"></div></section>
<main id="list"></main>
<nav class="bottom"><button onclick="window.scrollTo(0,0)">🏠<br>홈</button><button onclick="loadData()">↻<br>새로고침</button><button onclick="openAdmin()">🔐<br>관리자</button></nav>
<div id="adminModal" class="modalBg"><div class="modal"><h2>🔐 관리자 모드</h2><input id="adminPw" type="password" placeholder="비밀번호 입력"><div class="adminActions"><button onclick="loginAdmin()">로그인</button><button class="outline" onclick="closeAdmin()">닫기</button></div><div id="adminPanel" style="display:none;margin-top:14px"><h3>📢 공지 관리</h3><textarea id="noticeInput" placeholder="공지 내용을 입력하세요"></textarea><div class="adminActions"><button onclick="saveNotice()">공지 저장</button><button class="outline" onclick="deleteNotice()">공지 삭제</button></div><h3>👥 인원 관리</h3><input id="aNo" placeholder="번호"><input id="aName" placeholder="닉네임"><input id="aInsta" placeholder="@아이디"><div class="adminActions"><button onclick="openSheet()">구글시트 열기</button><button class="outline" onclick="openSheet()">추가/수정/삭제</button></div><div class="small">GitHub Pages는 보안상 구글시트를 직접 수정할 수 없어서, 실제 명단 추가/수정/삭제는 구글시트 앱에서 진행됩니다. 공지는 이 앱 안에 저장됩니다.</div></div></div></div>
<script>
const SHEET_ID = "1m14GywxIymZp6p9izJ6QVWaC8fCnjr5F5OdXCKKUcss";
const SHEET_NAME = "Sheet1";
const SHEET_EDIT_URL = "https://docs.google.com/spreadsheets/d/1m14GywxIymZp6p9izJ6QVWaC8fCnjr5F5OdXCKKUcss/edit";
const GROUP_SIZE = 30;
let data = [], selected = "전체";

function loadWithJsonp(){
  return new Promise((resolve,reject)=>{
    const cb = "yeowooCb_" + Date.now();
    window[cb] = json => { delete window[cb]; script.remove(); resolve(json); };
    const script = document.createElement("script");
    script.onerror = () => { delete window[cb]; script.remove(); reject(new Error("JSONP failed")); };
    script.src = "https://docs.google.com/spreadsheets/d/" + SHEET_ID + "/gviz/tq?sheet=" + encodeURIComponent(SHEET_NAME) + "&tqx=responseHandler:" + cb + ";out:json&cache=" + Date.now();
    document.body.appendChild(script);
  });
}
function parseRows(json){
  const rows = (json.table && json.table.rows) ? json.table.rows : [];
  const arr = rows.map(r=>{
    const c = r.c || [];
    return [c[0]?.v ?? "", c[1]?.v ?? "", c[2]?.v ?? ""];
  });
  if(arr.length && String(arr[0][0]).trim() === "번호") arr.shift();
  return arr.map(r=>({no:Number(String(r[0]).replace(/[^0-9]/g,"")),nickname:String(r[1]||"").trim(),insta:normalizeInsta(r[2])})).filter(x=>x.no&&x.nickname&&x.insta).sort((a,b)=>a.no-b.no);
}
function normalizeInsta(v){v=String(v||"").trim();return v?(v.startsWith("@")?v:"@"+v):""}
async function loadData(){
  document.getElementById("count").textContent="불러오는 중...";
  try{
    data = parseRows(await loadWithJsonp());
    makeTabs(); render();
  }catch(e){
    document.getElementById("total").textContent="0"; document.getElementById("groups").textContent="0";
    document.getElementById("count").textContent="연동 오류";
    document.getElementById("list").innerHTML='<div class="empty">명단을 불러오지 못했어요.<br>구글시트 공유 설정을 확인해주세요.</div>';
  }
  loadNotice();
}
function groupNo(no){return Math.floor((no-1)/GROUP_SIZE)+1}
function makeTabs(){
  const max = data.length ? Math.max(...data.map(x=>groupNo(x.no))) : 0;
  document.getElementById("total").textContent=data.length.toLocaleString();
  document.getElementById("groups").textContent=max.toLocaleString();
  let html='<button class="tab '+(selected==="전체"?"active":"")+'" onclick="selectTab(\'전체\')">전체</button>';
  for(let i=1;i<=max;i++) html+='<button class="tab '+(selected===i?"active":"")+'" onclick="selectTab('+i+')">'+i+'조</button>';
  document.getElementById("tabs").innerHTML=html;
}
function selectTab(g){selected=g;makeTabs();render()}
function render(){
  const q=document.getElementById("search").value.toLowerCase().trim();
  const filtered=data.filter(x=>(x.no+" "+x.nickname+" "+x.insta).toLowerCase().includes(q)&&(selected==="전체"||groupNo(x.no)===selected));
  document.getElementById("count").textContent="검색 결과 "+filtered.length.toLocaleString()+"명";
  const list=document.getElementById("list"); list.innerHTML="";
  if(!filtered.length){list.innerHTML='<div class="empty">표시할 인원이 없습니다.</div>';return}
  const grouped={}; filtered.forEach(x=>{const g=groupNo(x.no);(grouped[g]||(grouped[g]=[])).push(x)});
  Object.keys(grouped).map(Number).sort((a,b)=>a-b).forEach(g=>{
    list.insertAdjacentHTML("beforeend",'<div class="groupTitle">🦊 '+g+'조 ('+grouped[g].length+'명)</div><button class="groupCopy" onclick="copyGroup('+g+')">📋 '+g+'조 복사</button>');
    grouped[g].forEach(x=>{
      const id=String(x.insta).replace("@","");
      const card=document.createElement("div"); card.className="card";
      card.innerHTML='<div class="no">'+x.no+'</div><div class="info"><div class="name">'+esc(x.nickname)+'</div><div class="insta">'+esc(x.insta)+'</div></div><a class="ig" target="_blank" href="https://instagram.com/'+id+'">인스타</a>';
      list.appendChild(card);
    });
  });
}
function esc(s){return String(s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]))}
function line(x){return x.no+". "+x.nickname+" "+x.insta}
function copyGroup(g){navigator.clipboard.writeText(data.filter(x=>groupNo(x.no)===g).map(line).join(String.fromCharCode(10))).then(()=>alert(g+"조 복사 완료"))}
function openAdmin(){document.getElementById("adminModal").style.display="flex"}
function closeAdmin(){document.getElementById("adminModal").style.display="none"}
function loginAdmin(){if(document.getElementById("adminPw").value==="0702")document.getElementById("adminPanel").style.display="block";else alert("비밀번호가 틀렸습니다.")}
function openSheet(){location.href=SHEET_EDIT_URL}
function saveNotice(){const v=document.getElementById("noticeInput").value.trim();localStorage.setItem("yeowooNotice",v);loadNotice();alert("공지 저장 완료")}
function deleteNotice(){localStorage.removeItem("yeowooNotice");document.getElementById("noticeInput").value="";loadNotice();alert("공지 삭제 완료")}
function loadNotice(){const v=localStorage.getItem("yeowooNotice")||"";const b=document.getElementById("noticeBox");if(v){b.style.display="block";b.textContent="📢 "+v;document.getElementById("noticeInput").value=v}else{b.style.display="none";b.textContent=""}}
loadData();
</script>
</body>
</html>
