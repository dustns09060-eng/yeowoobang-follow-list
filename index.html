<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#ff5b93" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="여우방" />
  <title>여우방 팔로우리스트</title>
  <link rel="manifest" href="manifest.json?v=9" />
  <link rel="apple-touch-icon" href="icon-192.png?v=9" />
  <link rel="icon" href="icon-192.png?v=9" />
  <link rel="stylesheet" href="style.css?v=9" />
</head>
<body>
  <header class="hero">
    <div class="brand">
      <img class="logo" src="icon-192.png?v=9" alt="여우방" />
      <div>
        <div class="label">FOLLOW LIST</div>
        <h1>여우방 팔로우리스트</h1>
      </div>
    </div>
  </header>

  <main class="wrap">
    <section class="stats-card">
      <div class="stat"><b id="totalCount">0</b><span>전체 인원</span></div>
      <div class="stat"><b id="groupCount">0</b><span>전체 조</span></div>
      <div class="stat"><b id="groupSizeText">30</b><span>조별 인원</span></div>
    </section>

    <section class="control-card">
      <div class="search-wrap">
        <span>🔍</span>
        <input id="searchInput" type="search" placeholder="번호 · 닉네임 · 아이디 검색" autocomplete="off" />
      </div>
      <button id="refreshBtn" class="refresh-btn" type="button">🔄 새로고침</button>
      <div id="tabs" class="tabs"></div>
      <p id="resultText" class="result-text">불러오는 중...</p>
    </section>

    <section id="memberList" class="member-list"></section>
  </main>

  <nav class="bottom-nav">
    <button id="homeBtn" type="button">🏠<span>홈</span></button>
    <button id="refreshBottomBtn" type="button">🔄<span>새로고침</span></button>
  </nav>

  <div id="toast" class="toast" role="status"></div>
  <script src="script.js?v=9"></script>
</body>
</html>
