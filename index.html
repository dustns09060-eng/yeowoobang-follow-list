<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="theme-color" content="#ff4f87" />
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="style.css" />
  <title>여우방 팔로우리스트</title>
</head>
<body>
<header class="hero">
  <img class="logo" src="icon-192.png" alt="여우방">
  <div>
    <div class="eyebrow">FOLLOW LIST</div>
    <h1>여우방 팔로우리스트</h1>
  </div>
</header>

<main>
  <section class="stats">
    <div><b id="totalCount">0</b><span>전체 인원</span></div>
    <div><b id="groupCount">0</b><span>전체 조</span></div>
    <div><b id="groupSizeText">30</b><span>조별 인원</span></div>
  </section>

  <section class="panel">
    <input id="searchInput" placeholder="🔍 번호 · 닉네임 · 아이디 검색" />
    <div class="topBtns">
      <button id="refreshBtn">🔄 새로고침</button>
      <button id="adminBtn" class="adminBtn">🔐 관리자모드</button>
    </div>
    <div id="tabs" class="tabs"></div>
    <p id="resultCount" class="resultCount">검색 결과 0명</p>
  </section>

  <section id="noticeBox" class="notice hidden"></section>
  <section id="list"></section>
</main>

<nav class="bottomNav">
  <button onclick="window.scrollTo({top:0,behavior:'smooth'})">🏠<span>홈</span></button>
  <button id="bottomRefresh">🔄<span>새로고침</span></button>
  <button id="bottomAdmin">🔐<span>관리자</span></button>
</nav>

<div id="adminModal" class="modal hidden">
  <div class="modalCard">
    <button class="x" id="closeAdmin">×</button>
    <h2>🔐 관리자 모드</h2>
    <input id="adminPw" type="password" inputmode="numeric" placeholder="비밀번호 0702 입력">
    <button id="loginBtn">로그인</button>

    <div id="adminArea" class="hidden">
      <div class="adminTabs">
        <button data-admin-tab="add" class="on">추가</button>
        <button data-admin-tab="edit">수정</button>
        <button data-admin-tab="delete">삭제</button>
        <button data-admin-tab="notice">공지</button>
      </div>

      <div id="admin-add" class="adminPane">
        <h3>➕ 인원 추가</h3>
        <input id="addName" placeholder="닉네임">
        <input id="addInsta" placeholder="@아이디">
        <button onclick="adminAdd()">추가하기</button>
      </div>

      <div id="admin-edit" class="adminPane hidden">
        <h3>✏️ 인원 수정</h3>
        <input id="editNo" inputmode="numeric" placeholder="수정할 번호">
        <input id="editName" placeholder="새 닉네임">
        <input id="editInsta" placeholder="@새 아이디">
        <button onclick="adminEdit()">수정하기</button>
      </div>

      <div id="admin-delete" class="adminPane hidden">
        <h3>🗑 인원 삭제</h3>
        <input id="deleteNo" inputmode="numeric" placeholder="삭제할 번호">
        <button class="danger" onclick="adminDelete()">삭제하기</button>
      </div>

      <div id="admin-notice" class="adminPane hidden">
        <h3>📢 공지 작성</h3>
        <input id="noticeTitle" placeholder="공지 제목">
        <textarea id="noticeContent" placeholder="공지 내용"></textarea>
        <button onclick="adminNotice()">공지 저장</button>
        <button class="light" onclick="adminClearNotice()">공지 삭제</button>
      </div>

      <p class="hint">비밀번호: 0702<br>실제 수정은 script.js의 BACKEND_URL 연결 후 반영됩니다.</p>
    </div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
