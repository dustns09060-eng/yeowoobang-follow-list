<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#ff5b96" />
  <title>여우방 팔로우리스트</title>
  <link rel="manifest" href="./manifest.json?v=15" />
  <link rel="apple-touch-icon" href="./icon-192.png?v=15" />
  <link rel="icon" href="./icon-192.png?v=15" />
  <link rel="stylesheet" href="./style.css?v=15" />
</head>
<body>
  <header class="hero">
    <img class="app-logo" src="./icon-192.png?v=15" alt="여우방" onerror="this.style.display='none';document.querySelector('.logo-fallback').style.display='grid'">
    <div class="logo-fallback" aria-hidden="true">🦊</div>
    <div>
      <div class="eyebrow">FOLLOW LIST</div>
      <h1>여우방 팔로우리스트</h1>
    </div>
  </header>

  <main class="wrap">
    <section class="stats-card">
      <div><b id="totalCount">0</b><span>전체 인원</span></div>
      <div><b id="groupCount">0</b><span>전체 조</span></div>
      <div><b id="groupSizeBox">30</b><span>조별 인원</span></div>
    </section>

    <section class="control-card">
      <label class="search-box">
        <span>🔍</span>
        <input id="searchInput" type="search" placeholder="번호 · 닉네임 · 아이디 검색" autocomplete="off" />
      </label>
      <div class="action-row">
        <button id="reloadBtn" class="main-btn pink">↻ 새로고침</button>
        <button id="adminOpenBtn" class="main-btn dark">🔐 관리자모드</button>
      </div>
      <div id="tabs" class="tabs"></div>
      <p id="resultCount" class="muted">검색 결과 0명</p>
    </section>

    <section id="noticeBox" class="notice-card hidden">
      <div class="notice-head"><b>📢 공지</b><button id="noticeMoreBtn">닫기</button></div>
      <p id="noticeText"></p>
    </section>

    <section id="list" class="list"></section>
  </main>

  <nav class="bottom-nav">
    <button id="homeBtn">🏠<span>홈</span></button>
    <button id="reloadBottomBtn">↻<span>새로고침</span></button>
    <button id="adminBottomBtn">🔐<span>관리자</span></button>
  </nav>

  <div id="adminModal" class="modal hidden">
    <div class="modal-panel">
      <button class="close" id="adminCloseBtn">×</button>
      <h2>🔐 관리자 모드</h2>
      <div id="loginBox" class="login-box">
        <input id="adminPw" type="password" inputmode="numeric" placeholder="비밀번호 입력" />
        <button id="loginBtn" class="main-btn pink small">로그인</button>
      </div>

      <div id="adminPanel" class="hidden admin-panel">
        <div class="admin-top">
          <strong>관리자 기능</strong>
          <button id="logoutBtn" class="mini-btn">로그아웃</button>
        </div>

        <section class="admin-section">
          <h3>📢 공지 관리</h3>
          <textarea id="noticeInput" maxlength="200" placeholder="공지 내용을 입력하세요."></textarea>
          <div class="admin-actions">
            <button id="saveNoticeBtn" class="main-btn pink small">공지 저장</button>
            <button id="deleteNoticeBtn" class="main-btn line small">공지 삭제</button>
          </div>
        </section>

        <section class="admin-section">
          <h3>👥 인원 추가</h3>
          <input id="addName" placeholder="닉네임" />
          <input id="addInsta" placeholder="@아이디" />
          <button id="addBtn" class="main-btn pink small">추가하기</button>
        </section>

        <section class="admin-section">
          <h3>✏️ 인원 수정</h3>
          <input id="editNo" inputmode="numeric" placeholder="수정할 번호" />
          <input id="editName" placeholder="새 닉네임" />
          <input id="editInsta" placeholder="@새 아이디" />
          <button id="editBtn" class="main-btn pink small">수정하기</button>
        </section>

        <section class="admin-section">
          <h3>🗑 인원 삭제</h3>
          <input id="deleteNo" inputmode="numeric" placeholder="삭제할 번호" />
          <button id="deleteBtn" class="main-btn danger small">삭제하기</button>
        </section>

        <p class="admin-note">실제 Google 시트 저장은 <b>script.js의 BACKEND_URL</b> 연결 후 작동합니다.</p>
      </div>
    </div>
  </div>

  <script src="./script.js?v=15"></script>
</body>
</html>
